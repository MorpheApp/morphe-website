      interval: weekly
    cooldown:
      default-days: 7

  - package-ecosystem: npm
    labels: []
    directory: /
    target-branch: dev
    schedule:
      interval: weekly
    cooldown:
      default-days: 7

  - package-ecosystem: gradle
    labels: []
    directory: /
    target-branch: dev
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
