name: i18n Check

on:
  workflow_dispatch:
  push:
    branches: [ main, dev ]
    paths:
      - 'public/**/*.html'
      - 'public/locales/*.json'
      - 'scripts/**'
  pull_request:
    branches: [ main, dev ]
    paths:
      - 'public/**/*.html'
      - 'public/locales/*.json'
      - 'scripts/**'

jobs:
  check-translations:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check translation completeness
        id: check_status
        run: |
          # Run check and save output
          # We allow failure here so we can generate the report/comment
          npm run i18n:check > translation-report.txt || true
          cat translation-report.txt
          
          # Extract average completion
          AVG=$(grep "Average completion" translation-report.txt | grep -oP '\d+' || echo "0")
          echo "avg_completion=$AVG" >> $GITHUB_OUTPUT
          
          # Check for specific issues
          MISSING=$(grep -E "^\s+\d+/\d+ translated, [1-9]\d* missing" translation-report.txt | wc -l || echo "0")
          UNTRANSLATED_LOCALES=$(grep -E "^\s+\d+/\d+ translated, \d+ missing, [1-9]\d* untranslated" translation-report.txt | wc -l || echo "0")
          ZOMBIES=$(grep -E "^[a-z-]+: \d+ zombie key" translation-report.txt | wc -l || echo "0")
          HAS_ERRORS=$(grep "✖ Error" translation-report.txt | wc -l || echo "0")
          
          echo "missing_count=$MISSING" >> $GITHUB_OUTPUT
          echo "untranslated_count=$UNTRANSLATED_LOCALES" >> $GITHUB_OUTPUT
          echo "zombie_count=$ZOMBIES" >> $GITHUB_OUTPUT
          
          # Determine if there are issues
          if [ "$AVG" -eq 100 ] && [ "$MISSING" -eq 0 ] && [ "$UNTRANSLATED_LOCALES" -eq 0 ] && [ "$ZOMBIES" -eq 0 ] && [ "$HAS_ERRORS" -eq 0 ]; then
            echo "has_issues=false" >> $GITHUB_OUTPUT
          else
            echo "has_issues=true" >> $GITHUB_OUTPUT
          fi

      - name: Extract i18n keys from HTML
        run: npm run i18n:extract

      - name: Check for changes in base files
        id: check_changes
        run: |
          # Check if en.json or lang-preload.js were updated by extract
          CHANGES=false
          if ! git diff --exit-code public/locales/en.json; then
            CHANGES=true
          fi
          if ! git diff --exit-code public/js/lang-preload.js; then
            CHANGES=true
          fi
          
          if [ "$CHANGES" = "true" ]; then
            echo "changes=true" >> $GITHUB_OUTPUT
          else
            echo "changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate PR comment
        id: generate_comment
        if: github.event_name == 'pull_request'
        run: |
          AVG="${{ steps.check_status.outputs.avg_completion }}"
          HAS_ISSUES="${{ steps.check_status.outputs.has_issues }}"
          EN_CHANGES="${{ steps.check_changes.outputs.changes }}"
          MISSING="${{ steps.check_status.outputs.missing_count }}"
          UNTRANSLATED_LOCALES="${{ steps.check_status.outputs.untranslated_count }}"
          ZOMBIES="${{ steps.check_status.outputs.zombie_count }}"
          
          # Start building comment
          echo "## 🌐 i18n Status Report" > comment.md
          echo "" >> comment.md
          
          # En.json update warning
          if [ "$EN_CHANGES" = "true" ]; then
            echo "### ⚠️ English Translation Base Updated" >> comment.md
            echo "" >> comment.md
            echo "The \`en.json\` file has been modified. Please run:" >> comment.md
            echo "\`\`\`bash" >> comment.md
            echo "npm run i18n:extract" >> comment.md
            echo "git add public/locales/en.json public/js/lang-preload.js" >> comment.md
            echo "git commit -m 'chore: update i18n base files'" >> comment.md
            echo "\`\`\`" >> comment.md
            echo "" >> comment.md
          fi
          
          # Translation status
          if [ "$HAS_ISSUES" = "false" ]; then
            echo "### ✅ Translations: Perfect!" >> comment.md
            echo "" >> comment.md
            echo "**Average Completion:** ${AVG}% 🎉" >> comment.md
            echo "" >> comment.md
            echo "All translations are complete with no issues detected." >> comment.md
          else
            echo "### 📊 Translations: ${AVG}% Complete" >> comment.md
            echo "" >> comment.md
          
            # Status badges
            if [ "$AVG" -ge 95 ]; then
              echo "![Status](https://img.shields.io/badge/status-excellent-success)" >> comment.md
            elif [ "$AVG" -ge 85 ]; then
              echo "![Status](https://img.shields.io/badge/status-good-yellow)" >> comment.md
            else
              echo "![Status](https://img.shields.io/badge/status-needs_work-red)" >> comment.md
            fi
            echo "" >> comment.md
          
            # Issues summary
            if [ "$MISSING" -gt 0 ]; then
              echo "- ⚠️ **$MISSING** missing translation(s)" >> comment.md
            fi
            if [ "$UNTRANSLATED_LOCALES" -gt 0 ]; then
              echo "- ⚠️ **$UNTRANSLATED_LOCALES** locale(s) contain untranslated string(s)" >> comment.md
            fi
            if [ "$ZOMBIES" -gt 0 ]; then
              echo "- 🧟 **$ZOMBIES** zombie key(s) found" >> comment.md
            fi
            echo "" >> comment.md
          
            # Detailed report in collapsible section
            echo "<details>" >> comment.md
            echo "<summary>📋 View detailed report</summary>" >> comment.md
            echo "" >> comment.md
            echo "\`\`\`" >> comment.md
            cat translation-report.txt >> comment.md
            echo "\`\`\`" >> comment.md
            echo "" >> comment.md
            echo "</details>" >> comment.md
            echo "" >> comment.md
          
            # Action items
            echo "### 🔧 Action Items" >> comment.md
            echo "" >> comment.md
            if [ "$MISSING" -gt 0 ]; then
              echo "- Complete missing translations for all locales" >> comment.md
            fi
            if [ "$UNTRANSLATED_LOCALES" -gt 0 ]; then
              echo "- Translate untranslated strings (currently same as English) in all locales" >> comment.md
            fi
            if [ "$ZOMBIES" -gt 0 ]; then
              echo "- Remove unused translation keys from locale files" >> comment.md
            fi
            echo "- Run \`npm run i18n:check\` locally for full details" >> comment.md
          fi
          
          # Footer
          echo "" >> comment.md
          echo "---" >> comment.md
          echo "*This report is automatically generated on every push*" >> comment.md

      - name: Find existing comment
        if: github.event_name == 'pull_request'
        uses: peter-evans/find-comment@v4
        id: find_comment
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: 'github-actions[bot]'
          body-includes: '🌐 i18n Status Report'

      - name: Create or update comment
        if: github.event_name == 'pull_request'
        uses: peter-evans/create-or-update-comment@v5
        with:
          comment-id: ${{ steps.find_comment.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          body-path: comment.md
          edit-mode: replace

      - name: Set commit status
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v9
        with:
          script: |
            const avg = parseInt('${{ steps.check_status.outputs.avg_completion }}');
            const hasIssues = '${{ steps.check_status.outputs.has_issues }}' === 'true';
            const enChanges = '${{ steps.check_changes.outputs.changes }}' === 'true';
            
            // Determine status
            let state, description;
            
            if (enChanges) {
              state = 'failure';
              description = '❌ i18n base files need to be updated';
            } else if (avg === 100 && !hasIssues) {
              state = 'success';
              description = '✅ All translations complete';
            } else if (avg >= 90) {
              state = 'success';
              description = `⚠️ ${avg}% complete - minor issues`;
            } else if (avg >= 75) {
              state = 'failure';
              description = `❌ ${avg}% complete - needs work`;
            } else {
              state = 'failure';
              description = `❌ ${avg}% complete - critical`;
            }
            
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.payload.pull_request.head.sha,
              state: state,
              target_url: `https://github.com/${context.repo.owner}/${context.repo.repo}/pull/${context.issue.number}`,
              description: description,
              context: 'i18n / Translation Completeness'
            });

      - name: Upload translation report as artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: translation-report
          path: translation-report.txt
          retention-days: 30
