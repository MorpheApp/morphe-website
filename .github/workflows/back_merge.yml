name: Back Merge Main to Dev

on:
  push:
    branches:
      - main

jobs:
  back-merge:
    name: Back Merge Main to Dev
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set Git user
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Merge main into dev
        run: |
          git fetch origin dev
          git checkout dev
          
          # Check if dev is an ancestor of main (i.e., dev is just behind main)
          if git merge-base --is-ancestor dev origin/main; then
            echo "dev is behind main. Fast-forwarding dev to main."
            git reset --hard origin/main
          else
            echo "dev and main have diverged. Attempting standard merge."
            if git merge origin/main -m "chore: merge main back into dev [skip ci]"; then
              echo "Merge successful."
            else
              echo "Merge conflicts detected. Manual intervention required."
              exit 1
            fi
          fi
          
          git push origin dev
