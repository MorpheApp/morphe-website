name: Back Merge Main to Dev

on:
  push:
    branches:
      - main

jobs:
  back-merge:
    name: Back Merge Main to Dev
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set Git user
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Rebase dev onto main
        run: |
          git fetch origin

          git checkout dev

          # Attempt rebase
          if git rebase origin/main; then

            # Check if dev changed compared to remote
            if git diff --quiet origin/dev..dev; then
              echo "No changes after rebase — nothing to push."
            else
              echo "Rebase produced changes — pushing."
              git push origin dev --force-with-lease
            fi

          else
            echo "Rebase conflict — aborting."
            git rebase --abort
            exit 1
          fi
