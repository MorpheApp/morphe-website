name: Back Merge Main to Dev

on:
  push:
    branches:
      - main

jobs:
  back-merge:
    name: Back Merge Main to Dev
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set Git user
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Merge main into dev
        run: |
          git fetch origin dev
          git checkout dev

          # Attempt merge without committing
          if git merge --no-commit --no-ff origin/main; then

            # Check if merge produced any changes
            if git diff --quiet --cached; then
              echo "No changes to merge — aborting merge to avoid empty commit."
              git merge --abort
            else
              echo "Changes detected — committing merge."
              git commit -m "chore: merge main back into dev [skip ci]"
              git push origin dev
            fi

          else
            echo "Merge conflicts detected. Manual intervention required."
            exit 1
          fi
